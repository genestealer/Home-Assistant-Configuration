
# Substitutions - Easily Configurable Parameters
substitutions:
  # Naming & Identification
  name: new-water-meter
  friendly_name: "Water Meter Monitor"
  ui_comment: "Monitors water meter via CC1101 RF module"

  # Network Configuration (Static IP)
  ip: 192.168.2.201
  gateway: 192.168.2.1
  subnet: 255.255.255.0

  # Status LED (ESP8266 Onboard LED)
  status_led: LED_RED  # GPIO0 (ESP8266)
  # status_led: GPIO0  # GPIO0 (ESP8266)
  status_led_inverted: "true"

  # # Debug Logging
  # log_level: DEBUG

  # Sensor Update Interval
  sensor_update_interval: 1min
  wifi_sensor_update_interval: 10min

  

##############################################################
# Board Configuration
##############################################################
esp8266:
  board: huzzah


##############################################################
# Import Shared Code (Common Components)
##############################################################
packages:
  device_base: !include common/device_base.yaml
  status_led: !include common/status_led.yaml
  wifi: !include common/device_base_wifi.yaml



##############################################################
# Sensor Configuration (Temperature, Humidity, Air Quality)
##############################################################

# Uses common configurations from the included `bme280.yaml` and `pms5003t.yaml`.
# Automatically calculates air quality index (DAQI) based on UK standards.
# Reduces sensor wear by limiting PMS5003T operation.

# EverBlu Water Meter - Complete Example Configuration
# This example shows all available sensors and configuration options


# Enable logging
logger:
  level: DEBUG  # Or DEBUG
  baud_rate: 115200
  logs:
    everblu_meter: DEBUG  # Only this component exists now


# Time component (required for scheduled readings)
time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - logger.log: "Time synchronized with Home Assistant"


external_components:
  - source:
      type: git
      url: https://github.com/genestealer/everblu-meters-esp8266-improved
      ref: main
      path: ESPHOME-release
    components: [ everblu_meter ]
    refresh: 0d


