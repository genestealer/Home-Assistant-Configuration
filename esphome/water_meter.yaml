everblu_meter:
  # debug_cc1101: true
  # spi_id: main_bus
  # cs_pin: 15
  gdo0_pin: 5

  id: my_water_meter
  
  # Meter identification (REQUIRED)
  meter_year: 20          # Last 2 digits of year (e.g., 21 for 2021)
  meter_serial: 257750  # Your meter's serial number
  

  # Link to time component
  time_id: homeassistant_time

  timezone_offset: 0
  
  # Control buttons
  request_reading_button:
    name: "Read Meter Now"
  frequency_scan_button:
    name: "Scan Frequency"
  reset_frequency_button:
    name: "Reset Frequency Offset"
  
  # Volume sensors
  volume:
    name: "Water Volume"
  
  counter:
    name: "Read Counter"
  
  # Battery sensor
  battery:
    name: "Meter Battery"
  
  # Radio quality sensors
  rssi:
    name: "Meter RSSI"
  
  rssi_percentage:
    name: "RSSI Percentage"
  
  lqi:
    name: "LQI"
  
  lqi_percentage:
    name: "LQI Percentage"
  
  # Statistics sensors
  total_attempts:
    name: "Total Read Attempts"
  
  successful_reads:
    name: "Successful Reads"
  
  failed_reads:
    name: "Failed Reads"
  
  frequency_offset:
    name: "Frequency Offset"

  tuned_frequency:
    name: "Tuned Frequency (MHz)"

  # Diagnostic text sensors
  meter_serial_sensor:
    name: "Meter Serial"
  meter_year_sensor:
    name: "Meter Year"
  reading_schedule_sensor:
    name: "Reading Schedule"
  reading_time_utc_sensor:
    name: "Reading Time (UTC)"
  
  # Timing sensors (24-hour format: HH:MM)
  time_start:
    name: "Reading Start Time"
  
  time_end:
    name: "Reading End Time"
  
  # Status text sensors
  status:
    name: "Meter Status"
  
  error:
    name: "Last Error"
  
  radio_state:
    name: "CC1101 State"
  
  timestamp:
    name: "Last Reading Time"
  
  history_json:
    name: "Meter History (JSON)"
  
  # Binary sensors
  active_reading:
    name: "Reading Active"
  
  radio_connected:
    name: "CC1101 Connected"


