# Used for shaded night indicators on mini-graph-card
# https://style.oversubstance.net/2021/11/adding-night-shading-to-a-home-assistant-mini-graph-card-chart/
# https://gist.github.com/GuySie/d60984c58aa1e5b1ac2dfe75c070e3f9#file-ha-night-state-template-txt
# This template creates a sensor.nightstate entity that will be set to 1 when sun.sun is below_horizon and 0 when sun.sun is not. That’s exactly what mini-graph-card needs to apply the night indicator shading.
# See also: https://style.oversubstance.net/2021/08/diy-use-an-ikea-vindriktning-air-quality-sensor-in-home-assistant-with-esphome/
# - platform: template
#   sensors:
#     nightstate:
#       friendly_name: Night State
#       value_template: "{% if is_state('sun.sun', 'below_horizon') %}1{% else %}0{% endif %}"

# Also used by kloggy/HA-Irrigation-Version2, so moved from "Night State" to "Night or Day"

#=========================================
# Night or Day - used primarily in graphs
# Used in https://github.com/kloggy/HA-Irrigation-Version2
#=========================================

- sensor:
    - name: Night or Day
      unique_id: night_or_day
      state: >-
        {% if is_state('sun.sun', 'below_horizon') %}
          1
        {% else %}
          0
        {% endif %}
      icon: >-
        {% if is_state('sun.sun', 'below_horizon') %}
          mdi:power-sleep
        {% else %}
          mdi:white-balance-sunny
        {% endif %}

## June 2026 moved to an helper as this was just not working!

# https://community.home-assistant.io/t/openweathermap-version-3-0/717870/64?u=richard.huish

- trigger:
    - platform: time_pattern
      minutes: /15
    - platform: homeassistant
      event: start
    - platform: event
      event_type: event_template_reloaded
  action:
    - service: weather.get_forecasts
      target:
        entity_id: weather.openweathermap
      data:
        type: daily
      response_variable: forecast_result
    - variables:
        forecast_today: "{{ forecast_result['weather.openweathermap'].forecast[0] }}"
  sensor:
    - name: Openweathermap Forecast Temperature High
      unique_id: openweathermap_forecast_temperature
      state: "{{ forecast_today.temperature }}"
      attributes:
        timestamp: "{{ forecast_today.datetime }}"
      icon: mdi:thermometer
      unit_of_measurement: "°C"
      device_class: temperature

    - name: Openweathermap Forecast Temperature Low
      unique_id: openweathermap_forecast_temperature_low
      state: "{{ forecast_today.templow }}"
      attributes:
        timestamp: "{{ forecast_today.datetime }}"
      icon: mdi:thermometer
      unit_of_measurement: "°C"
      device_class: temperature

    - name: Openweathermap Forecast Precipitation
      unique_id: openweathermap_forecast_precipitation
      state: "{{ forecast_today.precipitation | float(0) }}"
      attributes:
        timestamp: "{{ forecast_today.datetime }}"
      icon: mdi:weather-rainy
      unit_of_measurement: "mm"
      device_class: precipitation
      state_class: measurement

    - name: Openweathermap Forecast Precipitation Probability
      unique_id: openweathermap_forecast_precipitation_probability
      state: "{{ forecast_today.precipitation_probability | int(0) }}"
      attributes:
        timestamp: "{{ forecast_today.datetime }}"
      icon: mdi:weather-pouring
      unit_of_measurement: "%"
